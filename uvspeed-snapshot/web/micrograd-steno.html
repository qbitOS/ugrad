<!DOCTYPE html>
<!-- beyondBINARY quantum-prefixed | uvspeed | {n, +1, -n, +0, 0, -1, +n, +2, -0, +3, 1} -->
<html lang="en" data-theme="dark">

<meta charset="UTF-8">

<link rel="icon" href="../icons/favicon.ico" sizes="any">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020408;--bg2:#0d1117;--bg3:#161b22;--fg:#c9d1d9;--dim:#484f58;--border:#21262d;--green:#3fb950;--yellow:#c9a84c;--red:#f85149;--blue:#58a6ff;--purple:#bc8cff;--orange:#d29922;--cyan:#56d4dd}
html,body{height:100%;background:var(--bg);color:var(--fg);font:11px/1.5 'SF Mono','Fira Code','Cascadia Code',monospace;overflow:hidden;color-scheme:dark}
#app{display:grid;grid-template-rows:auto 1fr auto;grid-template-columns:1fr 280px;height:100vh}
#hdr{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:3px 10px;border-bottom:1px solid var(--border);user-select:none;font-size:10px}
#hdr .title{color:var(--yellow);font-weight:600;font-size:11px}
.badge{padding:1px 6px;border-radius:3px;font-size:9px;border:1px solid var(--border)}
.badge-gen{color:var(--green);border-color:#238636}
.badge-data{color:var(--blue)}
.badge-arch{color:var(--purple)}
.badge-speed{color:var(--orange)}
#hdr .spacer{flex:1}
#hdr button{background:none;border:1px solid var(--border);color:var(--blue);font:9px/1 inherit;padding:2px 8px;border-radius:3px;cursor:pointer}
#hdr button:hover{border-color:var(--blue)}
#log-wrap{overflow-y:auto;padding:6px 10px;contain:content}
#log-wrap::-webkit-scrollbar{width:2px}
#log-wrap::-webkit-scrollbar-thumb{background:var(--bg3)}
.ln{min-height:1.35em;white-space:pre-wrap;word-break:break-all}
.ln.cmd{color:var(--yellow)}.ln.err{color:var(--red)}.ln.ok{color:var(--green)}.ln.info{color:var(--dim)}
#panel{border-left:1px solid var(--border);overflow-y:auto;padding:6px 8px;font-size:9px}

#panel::-webkit-scrollbar-thumb{background:var(--bg3)}
#panel h3{color:var(--dim);font-size:9px;font-weight:400;text-transform:uppercase;letter-spacing:1px;margin:8px 0 4px;padding-bottom:2px;border-bottom:1px solid var(--border)}
#panel h3:first-child{margin-top:0}
#panel .row{display:flex;justify-content:space-between;padding:1px 0}
#panel .row .k{color:var(--dim)}
#panel .row .v{text-align:right}
#panel canvas{width:100%;border-radius:3px;margin:3px 0}
#input-bar{grid-column:1/-1;display:flex;align-items:center;border-top:1px solid var(--border);padding:0 10px;gap:6px}
#prompt{color:var(--green);font-size:10px;user-select:none;flex-shrink:0}
#cmd{flex:1;background:none;border:none;color:var(--fg);font:11px/1.5 inherit;outline:none;padding:4px 0}
#cmd::placeholder{color:var(--dim)}
.g{color:var(--green)}.y{color:var(--yellow)}.r{color:var(--red)}.c{color:var(--blue)}.m{color:var(--purple)}.o{color:var(--orange)}.d{color:var(--dim)}.cy{color:var(--cyan)}
#btn-mic.active{color:var(--red);border-color:var(--red)}
#qp-theme-toggle{position:static!important;top:auto!important;right:auto!important;z-index:auto!important}
@media(max-width:700px){#app{grid-template-columns:1fr}#panel{display:none}}
</style>

<body>
<div id="app">
<div id="hdr">
<span class="title">μgrad</span>

</div>

<div id="panel">
<h3>generation</h3>
<div id="p-gen"></div>
<h3>speed</h3>

<canvas id="c-speed" height="60"></canvas>

<div id="p-steno"></div>
</div>

<span id="prompt">μgrad></span>
<input id="cmd" type="text" placeholder="type or speak — mic to dictate" autocomplete="off" spellcheck="false" autofocus>
</div>
</div>
<script defer src="quantum-prefixes.js"></script>
<script defer src="qbit-dac.js"></script>
<script defer src="qbit-steno.js"></script>
<script>
'use strict';
const $=id=>document.getElementById(id);
const logEl=$('log'), logWrap=$('log-wrap'), cmdEl=$('cmd');

function L(text,cls=''){const d=document.createElement('div');d.className='ln'+(cls?' '+cls:'');d.innerHTML=text;logEl.appendChild(d);logWrap.scrollTop=logWrap.scrollHeight;return d}
function clearLog(){logEl.innerHTML=''}

// ====================================================================
//  MICROGRAD ENGINE — full autograd with multi-dataset support
// ====================================================================
class Value {
  constructor(data, children=[], op='') {
    this.data = +data; this.grad = 0;
    this._backward = ()=>{}; this._prev = new Set(children); this._op = op;
  }
  add(o){o=o instanceof Value?o:new Value(o);const out=new Value(this.data+o.data,[this,o],'+');out._backward=()=>{this.grad+=out.grad;o.grad+=out.grad};return out}
  mul(o){o=o instanceof Value?o:new Value(o);const out=new Value(this.data*o.data,[this,o],'*');out._backward=()=>{this.grad+=o.data*out.grad;o.grad+=this.data*out.grad};return out}
  pow(e){const out=new Value(Math.pow(this.data,e),[this],`**${e}`);out._backward=()=>{this.grad+=e*Math.pow(this.data,e-1)*out.grad};return out}
  tanh(){const t=Math.tanh(this.data);const out=new Value(t,[this],'tanh');out._backward=()=>{this.grad+=(1-t*t)*out.grad};return out}
  relu(){const out=new Value(this.data>0?this.data:0,[this],'relu');out._backward=()=>{this.grad+=(out.data>0?1:0)*out.grad};return out}
  neg(){return this.mul(-1)} sub(o){return this.add((o instanceof Value?o:new Value(o)).neg())}
  div(o){return this.mul((o instanceof Value?o:new Value(o)).pow(-1))}
  backward(){const topo=[],vis=new Set();const b=v=>{if(!vis.has(v)){vis.add(v);v._prev.forEach(c=>b(c));topo.push(v)}};b(this);this.grad=1;for(let i=topo.length-1;i>=0;i--)topo[i]._backward()}
}

class Neuron {
  constructor(nin,nl=true){this.w=Array.from({length:nin},()=>new Value(Math.random()*2-1));this.b=new Value(0);this.nl=nl}
  call(x){let a=this.b;for(let i=0;i<this.w.length;i++)a=a.add(this.w[i].mul(x[i]));return this.nl?a.tanh():a}
  params(){return[...this.w,this.b]}
  getW(){return[...this.w.map(w=>w.data),this.b.data]}
  setW(ws){for(let i=0;i<this.w.length;i++)this.w[i].data=ws[i];this.b.data=ws[this.w.length]}
}
class Layer {
  constructor(ni,no,nl=true){this.neurons=Array.from({length:no},()=>new Neuron(ni,nl))}
  call(x){return this.neurons.map(n=>n.call(x))}
  params(){return this.neurons.flatMap(n=>n.params())}
}
class MLP {
  constructor(sizes){
    this.layers=[];
    for(let i=0;i<sizes.length-1;i++)this.layers.push(new Layer(sizes[i],sizes[i+1],i<sizes.length-2));
    this.arch=sizes;
  }
  call(x){for(const l of this.layers){const o=l.call(x);x=o.length===1?o:o}return x.length===1?x[0]:x}
  params(){return this.layers.flatMap(l=>l.params())}
  getW(){return this.layers.flatMap(l=>l.neurons.flatMap(n=>n.getW()))}
  setW(ws){let i=0;for(const l of this.layers)for(const n of l.neurons){const c=n.w.length+1;n.setW(ws.slice(i,i+c));i+=c}}
  get nParams(){return this.params().length}
  describe(){return this.arch.join('→')}
}

// ====================================================================
//  DATASETS — procedural generators
// ====================================================================
const Datasets = {
  xor(n=4){return{X:[[0,0],[0,1],[1,0],[1,1]],Y:[0,1,1,0],dim:2,name:'xor',n:4}},
  circle(n=100){
    const X=[],Y=[];
    for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,r=Math.random();const x=r*Math.cos(a),y=r*Math.sin(a);X.push([x,y]);Y.push(r<0.5?1:0)}
    return{X,Y,dim:2,name:'circle',n}
  },
  spiral(n=100){
    const X=[],Y=[];const half=Math.floor(n/2);
    for(let c=0;c<2;c++)for(let i=0;i<half;i++){const r=i/half*1;const t=c*Math.PI+i/half*Math.PI*2.5;const noise=()=>(Math.random()-0.5)*0.15;X.push([r*Math.cos(t)+noise(),r*Math.sin(t)+noise()]);Y.push(c)}
    return{X,Y,dim:2,name:'spiral',n:half*2}
  },
  moon(n=100){
    const X=[],Y=[];const half=Math.floor(n/2);
    for(let i=0;i<half;i++){const a=Math.PI*i/half;X.push([Math.cos(a)+(Math.random()-0.5)*0.15,Math.sin(a)+(Math.random()-0.5)*0.15]);Y.push(0)}
    for(let i=0;i<half;i++){const a=Math.PI*i/half;X.push([1-Math.cos(a)+(Math.random()-0.5)*0.15,0.5-Math.sin(a)+(Math.random()-0.5)*0.15]);Y.push(1)}
    return{X,Y,dim:2,name:'moon',n:half*2}
  }
};

// ====================================================================
//  TRAINING ENGINE — with smart early stopping
// ====================================================================
const CONVERGE_TH = 0.01, PLATEAU_W = 3;

function trainModel(model, data, epochs, lr, earlyStop=false, onEp=null) {
  const losses=[];let below=0;
  for(let ep=0;ep<epochs;ep++){
    let total=new Value(0);
    for(let i=0;i<data.X.length;i++){
      const x=data.X[i].map(v=>new Value(v));
      const pred=model.call(x);
      const diff=pred.sub(data.Y[i]);
      total=total.add(diff.mul(diff));
    }
    total=total.mul(1/data.X.length);
    model.params().forEach(p=>{p.grad=0});
    total.backward();
    model.params().forEach(p=>{p.data-=lr*p.grad});
    losses.push(total.data);
    if(onEp)onEp(ep,total.data);
    if(earlyStop&&total.data<CONVERGE_TH){below++;if(below>=PLATEAU_W)break}else below=0;
  }
  return losses;
}

function accuracy(model,data){
  let correct=0;
  for(let i=0;i<data.X.length;i++){
    const x=data.X[i].map(v=>new Value(v));
    const p=model.call(x).data;
    if(Math.round(p)===data.Y[i])correct++;
  }
  return correct/data.X.length;
}

// ====================================================================
//  GENERATIONAL STATE — the brain that persists across runs
// ====================================================================
const LS_KEY = 'ugrad-state';
const STATE = {
  gen: 0, arch: [2,4,4,1], dataName: 'xor', dataN: 100, lr: 0.1, epochs: 500,
  weights: null, history: [],
  bestLoss: Infinity, bestAcc: 0, bestMs: Infinity, bestEpochs: Infinity
};

function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify(STATE))}catch(e){}}
function loadState(){try{const s=localStorage.getItem(LS_KEY);if(s){const o=JSON.parse(s);Object.assign(STATE,o);return true}}catch(e){}return false}
function resetState(){localStorage.removeItem(LS_KEY);Object.assign(STATE,{gen:0,arch:[2,4,4,1],dataName:'xor',dataN:100,lr:0.1,epochs:500,weights:null,history:[],bestLoss:Infinity,bestAcc:0,bestMs:Infinity,bestEpochs:Infinity})}

function getData(){return Datasets[STATE.dataName](STATE.dataN)}

// ====================================================================
//  SINGLE GENERATION — train, measure, steno, record
// ====================================================================
function runGeneration(verbose=true) {
  const data = getData();
  const model = new MLP(STATE.arch);
  const isWarm = STATE.weights !== null;

  if (isWarm) model.setW(STATE.weights);
  const t0 = performance.now();
  const losses = trainModel(model, data, STATE.epochs, STATE.lr, isWarm);
  const ms = performance.now() - t0;
  const acc = accuracy(model, data);
  const ep = losses.length;
  const finalLoss = losses[losses.length - 1];

  STATE.weights = model.getW();
  STATE.gen++;
  if (finalLoss < STATE.bestLoss) STATE.bestLoss = finalLoss;
  if (acc > STATE.bestAcc) STATE.bestAcc = acc;
  if (ms < STATE.bestMs) STATE.bestMs = ms;
  if (ep < STATE.bestEpochs) STATE.bestEpochs = ep;

  let stenoStats = null;
  if (window.QbitSteno) {
    const src = `// G${STATE.gen} weights: ${STATE.weights.length} params  (gen ${STATE.gen})\n` +
      STATE.weights.map((w,i) => `    const  weight_${i}  =  ${w.toFixed(8)};`).join('\n');
    const r = window.QbitSteno.stenoEncode(src, 'javascript', { layer: 0 });
    stenoStats = r.stats;
  }

  const record = { gen: STATE.gen, ms, ep, loss: finalLoss, acc, warm: isWarm, arch: model.describe(), data: STATE.dataName, stenoStats, lr: STATE.lr, ts: Date.now() };
  STATE.history.push(record);
  saveState();

  if (verbose) {
    const tag = isWarm ? '<span class="g">warm</span>' : '<span class="y">cold</span>';
    L(`<span class="c">G${STATE.gen}</span> ${tag}  <span class="d">${model.describe()} · ${STATE.dataName}</span>`);
    L(`  <span class="d">time:</span> ${ms<1?ms.toFixed(2):ms.toFixed(1)}ms  <span class="d">epochs:</span> ${ep}/${STATE.epochs}  <span class="d">loss:</span> ${finalLoss<0.001?finalLoss.toExponential(2):finalLoss.toFixed(6)}  <span class="d">acc:</span> ${(acc*100).toFixed(1)}%`);
    if (isWarm && STATE.history.length >= 2) {
      const prev = STATE.history[STATE.history.length - 2];
      const speedup = prev.ms > 0.01 ? (prev.ms / ms).toFixed(1) : '∞';
      const epSaved = prev.ep - ep;
      L(`  <span class="o">↑ ${speedup}x faster</span>  <span class="d">${epSaved > 0 ? epSaved + ' epochs saved' : 'refining'}</span>`);
    }
    if (stenoStats) L(`  <span class="m">steno:</span> <span class="d">${stenoStats.totalBits}b in ${stenoStats.encodedLines} lines</span>`);
  }

  updateBadges();
  updatePanel(record, losses);
  return record;
}

// ====================================================================
//  EVOLVE — run N generations automatically
// ====================================================================
async function evolve(n=10, verbose=true) {
  if (verbose) L(`<span class="c">evolving ${n} generations...</span>`);
  const t0 = performance.now();
  for (let i = 0; i < n; i++) {
    runGeneration(verbose);
    if (verbose && n > 3) await new Promise(r => setTimeout(r, 0));
  }
  const totalMs = performance.now() - t0;
  if (verbose && STATE.history.length >= 2) {
    const first = STATE.history[STATE.history.length - n] || STATE.history[0];
    const last = STATE.history[STATE.history.length - 1];
    L('');
    L(`<span class="g">evolution complete</span>  <span class="d">${n} gens in ${totalMs.toFixed(0)}ms</span>`);
    L(`  <span class="d">G${first.gen}→G${last.gen}</span>  loss: ${first.loss.toFixed(4)}→${last.loss<0.001?last.loss.toExponential(2):last.loss.toFixed(6)}  time: ${first.ms.toFixed(1)}→${last.ms<1?last.ms.toFixed(2):last.ms.toFixed(1)}ms  ep: ${first.ep}→${last.ep}`);
    if (first.ms > 0.01) L(`  <span class="o">total speedup: ${(first.ms / last.ms).toFixed(1)}x</span>  <span class="d">across ${n} generations</span>`);
  }
}

// ====================================================================
//  BENCHMARK — statistical speed test
// ====================================================================
function benchmark(runs=20) {
  L(`<span class="c">benchmark: ${runs} cold + ${runs} warm...</span>`);
  const data = getData();
  const cT=[], wT=[], cE=[], wE=[];
  for (let i = 0; i < runs; i++) {
    const m1 = new MLP(STATE.arch);
    let t = performance.now(); const cL = trainModel(m1, data, STATE.epochs, STATE.lr, false);
    cT.push(performance.now()-t); cE.push(cL.length);
    const w = m1.getW();
    const m2 = new MLP(STATE.arch); m2.setW(w);
    t = performance.now(); const wL = trainModel(m2, data, STATE.epochs, STATE.lr, true);
    wT.push(performance.now()-t); wE.push(wL.length);
  }
  const avg=a=>a.reduce((s,v)=>s+v,0)/a.length;
  const med=a=>{const s=[...a].sort((a,b)=>a-b);return s[Math.floor(s.length/2)]};
  L(`  <span class="y">cold</span>  avg: ${avg(cT).toFixed(2)}ms  med: ${med(cT).toFixed(2)}ms  ep: ${avg(cE).toFixed(0)}`);
  L(`  <span class="g">warm</span>  avg: ${avg(wT).toFixed(2)}ms  med: ${med(wT).toFixed(2)}ms  ep: ${avg(wE).toFixed(0)}`);
  const su = avg(cT)/avg(wT);
  L(`  <span class="o">speedup: ${su.toFixed(1)}x avg</span>  med: ${(med(cT)/med(wT)).toFixed(1)}x  <span class="d">epochs saved avg: ${(avg(cE)-avg(wE)).toFixed(0)}</span>`);
}

// ====================================================================
//  PANEL VISUALIZATION
// ====================================================================
function updateBadges() {
  $('b-gen').textContent = `G${STATE.gen}`;
  $('b-data').textContent = STATE.dataName;
  $('b-arch').textContent = STATE.arch.join('→');
  if (STATE.history.length) {
    const last = STATE.history[STATE.history.length - 1];
    $('b-speed').textContent = last.ms < 1 ? last.ms.toFixed(2) + 'ms' : last.ms.toFixed(1) + 'ms';
  }
}

function updatePanel(record, losses) {
  // Generation info
  $('p-gen').innerHTML = [
    row('generation', `G${record.gen}`),
    row('mode', record.warm ? '<span class="g">warm</span>' : '<span class="y">cold</span>'),
    row('accuracy', `${(record.acc*100).toFixed(1)}%`),
    row('loss', record.loss < 0.001 ? record.loss.toExponential(2) : record.loss.toFixed(6)),
    row('params', new MLP(STATE.arch).nParams),
  ].join('');

  // Speed panel
  const h = STATE.history;
  $('p-speed').innerHTML = [
    row('time', record.ms < 1 ? record.ms.toFixed(2) + 'ms' : record.ms.toFixed(1) + 'ms'),
    row('epochs', `${record.ep}/${STATE.epochs}`),
    row('lr', STATE.lr),
    row('best time', STATE.bestMs < 1 ? STATE.bestMs.toFixed(2) + 'ms' : STATE.bestMs.toFixed(1) + 'ms'),
    row('best epochs', STATE.bestEpochs),
    h.length >= 2 ? row('speedup', `${(h[0].ms / record.ms).toFixed(1)}x vs G${h[0].gen}`) : '',
  ].join('');

  drawSpeedChart(h);
  drawBoundary();
  drawLossChart(losses);

  // Steno panel
  if (record.stenoStats) {
    $('p-steno').innerHTML = [
      row('bits hidden', record.stenoStats.totalBits),
      row('lines', `${record.stenoStats.encodedLines}/${record.stenoStats.totalLines}`),
      row('utilization', record.stenoStats.utilization + '%'),
    ].join('');
  }
}

function row(k,v){return `<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`}

function drawSpeedChart(history) {
  const c = $('c-speed'), ctx = c.getContext('2d');
  c.width = c.offsetWidth * 2; c.height = 60 * 2; ctx.scale(2, 2);
  const w = c.offsetWidth, h = 60;
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, w, h);
  if (history.length < 2) return;
  const times = history.map(r => r.ms);
  const maxT = Math.max(...times, 0.1);
  ctx.strokeStyle = '#3fb950'; ctx.lineWidth = 1.5; ctx.beginPath();
  times.forEach((t, i) => {
    const x = 4 + (i / (times.length - 1)) * (w - 8);
    const y = h - 4 - (t / maxT) * (h - 10);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  // epoch bars
  const eps = history.map(r => r.ep);
  const maxE = Math.max(...eps, 1);
  ctx.fillStyle = '#58a6ff33';
  eps.forEach((e, i) => {
    const x = 4 + (i / (eps.length - 1 || 1)) * (w - 8) - 1;
    const bh = (e / maxE) * (h - 10);
    ctx.fillRect(x, h - 4 - bh, 3, bh);
  });
}

function drawBoundary() {
  const c = $('c-boundary'), ctx = c.getContext('2d');
  const sz = 140; c.width = sz * 2; c.height = sz * 2; ctx.scale(2, 2);
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, sz, sz);
  if (!STATE.weights) return;
  const model = new MLP(STATE.arch); model.setW(STATE.weights);
  const data = getData();
  const res = 28;
  let xMin=-1.5,xMax=1.5,yMin=-1.5,yMax=1.5;
  if (data.name !== 'xor') {
    const xs = data.X.map(p=>p[0]), ys = data.X.map(p=>p[1]);
    xMin = Math.min(...xs)-0.3; xMax = Math.max(...xs)+0.3;
    yMin = Math.min(...ys)-0.3; yMax = Math.max(...ys)+0.3;
  }
  const cellW = sz / res, cellH = sz / res;
  for (let i = 0; i < res; i++) for (let j = 0; j < res; j++) {
    const px = xMin + (i / res) * (xMax - xMin);
    const py = yMin + (j / res) * (yMax - yMin);
    const v = model.call([new Value(px), new Value(py)]).data;
    const t = Math.max(0, Math.min(1, v));
    ctx.fillStyle = `rgba(${Math.floor(63+t*100)},${Math.floor(185-t*120)},${Math.floor(80+t*100)},0.3)`;
    ctx.fillRect(i * cellW, j * cellH, cellW + 0.5, cellH + 0.5);
  }
  data.X.forEach((p, idx) => {
    const sx = ((p[0] - xMin) / (xMax - xMin)) * sz;
    const sy = ((p[1] - yMin) / (yMax - yMin)) * sz;
    ctx.fillStyle = data.Y[idx] ? '#58a6ff' : '#f85149';
    ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI * 2); ctx.fill();
  });
}

function drawLossChart(losses) {
  const c = $('c-loss'), ctx = c.getContext('2d');
  c.width = c.offsetWidth * 2; c.height = 50 * 2; ctx.scale(2, 2);
  const w = c.offsetWidth, h = 50;
  ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, w, h);
  if (!losses || !losses.length) return;
  const maxL = Math.max(...losses, 0.01);
  ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 1; ctx.beginPath();
  losses.forEach((l, i) => {
    const x = 2 + (i / (losses.length - 1 || 1)) * (w - 4);
    const y = h - 2 - (l / maxL) * (h - 6);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.fillStyle = '#484f58'; ctx.font = '7px monospace';
  ctx.fillText(`${losses.length} ep`, 2, 9);
  ctx.fillText(losses[losses.length-1] < 0.001 ? losses[losses.length-1].toExponential(1) : losses[losses.length-1].toFixed(4), 2, h - 2);
}

      const nin = arch[layer], nout = arch[layer + 1];

const cmdHistory = [];
let histIdx = -1;

function exec(input) {
  const raw = input.trim();
  if (!raw) return;
  cmdHistory.push(raw);
  histIdx = cmdHistory.length;
  L(`<span class="y">μgrad></span> ${raw}`, 'cmd');
  const parts = raw.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);
  if (CMDS[cmd]) {
    try { CMDS[cmd](args); } catch(e) { L(`<span class="r">error: ${e.message}</span>`, 'err'); }
  } else {
    L(`<span class="r">unknown command:</span> ${cmd} <span class="d">— type help</span>`, 'err');
  }
}

cmdEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') { exec(cmdEl.value); cmdEl.value = ''; }
  if (e.key === 'ArrowUp') { e.preventDefault(); if (histIdx > 0) { histIdx--; cmdEl.value = cmdHistory[histIdx]; } }
  if (e.key === 'ArrowDown') { e.preventDefault(); if (histIdx < cmdHistory.length - 1) { histIdx++; cmdEl.value = cmdHistory[histIdx]; } else { histIdx = cmdHistory.length; cmdEl.value = ''; } }
});

$('btn-evolve').onclick = () => exec('evolve 10');
$('btn-mic').onclick = () => VoiceEngine.toggle();

  L('');

  if (restored && STATE.gen > 0) {
    L(`<span class="m">restored G${STATE.gen}</span> <span class="d">${STATE.arch.join('→')} · ${STATE.dataName} · ${STATE.weights?STATE.weights.length:0} weights</span>`);
    if (STATE.history.length) {
      const last = STATE.history[STATE.history.length - 1];
      L(`  <span class="d">last:</span> ${last.ms<1?last.ms.toFixed(2):last.ms.toFixed(1)}ms · ${last.ep}ep · loss ${last.loss<0.001?last.loss.toExponential(2):last.loss.toFixed(6)} · ${(last.acc*100).toFixed(0)}%`);
    }
    updateBadges();
    drawBoundary();
    L('');
    L('<span class="d">type</span> <span class="y">train</span> <span class="d">to continue or</span> <span class="y">evolve</span> <span class="d">to run 10 gens</span>');
  } else {
    L('<span class="d">type</span> <span class="y">help</span> <span class="d">for commands or</span> <span class="y">train</span> <span class="d">to begin</span>');
  }
});

// ====================================================================
//  VOICE INPUT — Web Speech API dictation
// ====================================================================
const VoiceEngine = {
  recognition: null,
  listening: false,
  init() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return false;
    this.recognition = new SR();
    this.recognition.continuous = true;
    this.recognition.interimResults = true;
    this.recognition.lang = 'en-US';
    this.recognition.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript.trim();
        if (e.results[i].isFinal) this.handleFinal(t);
        else cmdEl.value = t;
      }
    };
    this.recognition.onerror = (e) => {
      if (e.error !== 'no-speech') L(`<span class="d">mic: ${e.error}</span>`, 'info');
    };
    this.recognition.onend = () => { if (this.listening) try { this.recognition.start(); } catch(e){} };
    return true;
  },
  handleFinal(transcript) {
    const t = transcript.toLowerCase();
    L(`<span class="d">mic></span> ${transcript}`, 'info');
    const cmds = [
      [/\b(train)\b/, 'train'],
      [/\bevolve\s*(\d+)?/, (m) => `evolve ${m[1]||10}`],
      [/\b(benchmark|bench)\b/, 'bench'],
      [/\b(status)\b/, 'status'],
      [/\b(quantum)\b/, 'quantum'],
      [/\b(help)\b/, 'help'],
      [/\b(reset)\b/, 'reset'],
      [/\b(speed)\b/, 'speed'],
      [/\b(steno)\b/, 'steno'],
      [/\b(idiot)\b/, 'idiot'],
      [/\barch\w*\s+([\d,\s]+)/, (m) => `arch ${m[1].replace(/\s+/g,',')}`],
      [/\bdata\s+(xor|circle|spiral|moon)/, (m) => `data ${m[1]}`],
      [/\blearning rate\s+([\d.]+)/, (m) => `lr ${m[1]}`],
      [/\bepochs?\s+(\d+)/, (m) => `epochs ${m[1]}`],
      [/\bmic\s+(on|off)/, (m) => `mic ${m[1]}`],
      [/\b(clear)\b/, 'clear'],
    ];
    for (const [rx, action] of cmds) {
      const m = t.match(rx);
      if (m) { exec(typeof action === 'function' ? action(m) : action); return; }
    }
    cmdEl.value = transcript;
  },
  toggle() {
    if (!this.recognition && !this.init()) {
      L('<span class="r">speech recognition unavailable</span>', 'err');
      return;
    }
    this.listening = !this.listening;
    if (this.listening) {
      this.recognition.start();
      $('btn-mic').classList.add('active');
      L('<span class="g">mic on</span> <span class="d">— speak commands (train, evolve, bench, status, quantum, help...)</span>');
    } else {
      this.recognition.stop();
      $('btn-mic').classList.remove('active');
      L('<span class="d">mic off</span>');
    }
  }
};
