<script>
// ▶  μgrad contrail — the original ~100 line autograd engine
// ⊤  Karpathy's micrograd rewritten in JavaScript with contrail annotations
// ⊤  Every line carries a contrail symbol: its structural role in the quantum prefix system
// ⊤  Contrail symbols: ▶ entry ⊤ docs ← import ⊞ struct ○ func ⊥ error ◇ branch ∀ loop → return ⊙ output □ assign

// ⊞  ===== Value: scalar with autograd =====
class Value {
  // ○  constructor: wrap a scalar with gradient tracking
  constructor(data, children = [], op = '') {
    this.data = +data;         // □  the scalar value
    this.grad = 0;             // □  accumulated gradient
    this._backward = () => {}; // □  backward closure (chain rule)
    this._prev = new Set(children); // □  parent nodes
    this._op = op;             // □  operation label
  }

  // ○  addition: self + other, with backward
  add(other) {
    const o = other instanceof Value ? other : new Value(other); // □
    const out = new Value(this.data + o.data, [this, o], '+');   // □
    out._backward = () => {   // ○  chain rule: d(a+b)/da = 1
      this.grad += out.grad;  // □
      o.grad += out.grad;     // □
    };
    return out;               // →
  }

  // ○  multiplication: self * other, with backward
  mul(other) {
    const o = other instanceof Value ? other : new Value(other); // □
    const out = new Value(this.data * o.data, [this, o], '*');   // □
    out._backward = () => {       // ○  chain rule: d(a*b)/da = b
      this.grad += o.data * out.grad;    // □
      o.grad += this.data * out.grad;    // □
    };
    return out;                   // →
  }

  // ○  power: self ** exponent
  pow(exp) {
    const out = new Value(Math.pow(this.data, exp), [this], '**' + exp); // □
    out._backward = () => {       // ○  chain rule: d(x^n)/dx = n*x^(n-1)
      this.grad += exp * Math.pow(this.data, exp - 1) * out.grad; // □
    };
    return out;                   // →
  }

  // ○  tanh activation
  tanh() {
    const t = Math.tanh(this.data);               // □
    const out = new Value(t, [this], 'tanh');      // □
    out._backward = () => {   // ○  d(tanh)/dx = 1 - tanh²
      this.grad += (1 - t * t) * out.grad;        // □
    };
    return out;               // →
  }

  // ○  ReLU activation
  relu() {
    const out = new Value(this.data > 0 ? this.data : 0, [this], 'relu'); // □
    out._backward = () => {   // ○  d(relu)/dx = 1 if x>0 else 0
      this.grad += (out.data > 0 ? 1 : 0) * out.grad;  // □
    };
    return out;               // →
  }

  neg()   { return this.mul(-1); }               // ○  negate
  sub(o)  { return this.add((o instanceof Value ? o : new Value(o)).neg()); } // ○  subtract
  div(o)  { return this.mul((o instanceof Value ? o : new Value(o)).pow(-1)); } // ○  divide

  // ○  backpropagation: topological sort then reverse-mode autodiff
  backward() {
    const topo = [], visited = new Set();         // □
    const build = (v) => {    // ○  DFS topological sort
      if (!visited.has(v)) {  // ◇
        visited.add(v);       // □
        v._prev.forEach(c => build(c)); // ∀  recurse children
        topo.push(v);         // □
      }
    };
    build(this);              // □  build the topo order
    this.grad = 1;            // □  seed gradient = 1
    for (let i = topo.length - 1; i >= 0; i--) { // ∀  reverse topo
      topo[i]._backward();    // □  propagate gradients
    }
  }

  toString() { return `Value(${this.data.toFixed(4)}, grad=${this.grad.toFixed(4)})`; } // ○
}

// ⊞  ===== Neuron: single perceptron =====
class Neuron {
  constructor(nin, nonlin = true) {               // ○
    const s = Math.sqrt(2 / nin);                 // □  He initialization scale
    this.w = Array.from({ length: nin }, () =>    // □  weights
      new Value((Math.random() * 2 - 1) * s));
    this.b = new Value(0);                        // □  bias
    this.nonlin = nonlin;                         // □  use activation?
  }
  call(x) {                                       // ○  forward pass
    let act = this.b;                             // □  start with bias
    for (let i = 0; i < this.w.length; i++) {     // ∀  weighted sum
      act = act.add(this.w[i].mul(x[i]));         // □
    }
    return this.nonlin ? act.tanh() : act;        // →  activate or linear
  }
  parameters() { return [...this.w, this.b]; }    // ○  all trainable params
}

// ⊞  ===== Layer: row of neurons =====
class Layer {
  constructor(nin, nout, nonlin = true) {         // ○
    this.neurons = Array.from({ length: nout },   // □
      () => new Neuron(nin, nonlin));
  }
  call(x) { return this.neurons.map(n => n.call(x)); } // ○  forward each neuron
  parameters() { return this.neurons.flatMap(n => n.parameters()); } // ○
}

// ⊞  ===== MLP: multi-layer perceptron =====
class MLP {
  constructor(sizes) {                            // ○
    this.layers = [];                             // □
    for (let i = 0; i < sizes.length - 1; i++) {  // ∀  build layers
      this.layers.push(new Layer(                 // □
        sizes[i], sizes[i + 1], i < sizes.length - 2));
    }
  }
  call(x) {                                      // ○  forward through all layers
    for (const layer of this.layers) {            // ∀
      const out = layer.call(x);                  // □
      x = out.length === 1 ? out : out;           // □
    }
    return x.length === 1 ? x[0] : x;            // →
  }
  parameters() {                                  // ○
    return this.layers.flatMap(l => l.parameters()); // →
  }
}

// ⊤  ===== END OF CORE ENGINE: ~100 lines of autograd =====
// ⊤  That's it. Value + Neuron + Layer + MLP = complete differentiable programming.
// ⊤  Everything below is the interactive UI: training, visualization, contrail analysis.

// ○  ===== DATASETS =====
function genXOR(n=100){const X=[],y=[];for(let i=0;i<n;i++){const a=Math.random()>0.5?1:0,b=Math.random()>0.5?1:0;X.push([a*2-1,b*2-1]);y.push((a^b)?1:-1)}return{X,y}}
function genMoon(n=200){const X=[],y=[];for(let i=0;i<n;i++){const t=Math.random()*Math.PI;if(i<n/2){X.push([Math.cos(t)+Math.random()*0.3,Math.sin(t)+Math.random()*0.3]);y.push(1)}else{X.push([1-Math.cos(t)+Math.random()*0.3,1-Math.sin(t)-0.5+Math.random()*0.3]);y.push(-1)}}return{X,y}}
function genSpiral(n=200){const X=[],y=[];for(let i=0;i<n;i++){const r=i/n*5,t=1.75*i/n*2*Math.PI;if(i<n/2){X.push([r*Math.cos(t)+Math.random()*0.2,r*Math.sin(t)+Math.random()*0.2]);y.push(1)}else{X.push([r*Math.cos(t+Math.PI)+Math.random()*0.2,r*Math.sin(t+Math.PI)+Math.random()*0.2]);y.push(-1)}}return{X,y}}
function genCircle(n=200){const X=[],y=[];for(let i=0;i<n;i++){const a=Math.random()*2*Math.PI,r=Math.random()*2;X.push([r*Math.cos(a),r*Math.sin(a)]);y.push(r<1?1:-1)}return{X,y}}

// ○  ===== TRAINING LOOP =====
function train(model, dataset, epochs, lr, log) {
  const {X, y} = dataset;
  for (let ep = 0; ep < epochs; ep++) {
    let totalLoss = new Value(0);
    let correct = 0;
    for (let i = 0; i < X.length; i++) {
      const pred = model.call(X[i].map(v => new Value(v)));
      const loss = pred.mul(-y[i]).add(1).relu();
      totalLoss = totalLoss.add(loss);
      if ((pred.data > 0) === (y[i] > 0)) correct++;
    }
    totalLoss = totalLoss.mul(1 / X.length);
    const reg = model.parameters().reduce((s, p) => s.add(p.mul(p)), new Value(0)).mul(1e-4);
    totalLoss = totalLoss.add(reg);
    model.parameters().forEach(p => { p.grad = 0; });
    totalLoss.backward();
    const curLR = lr * (1 - ep / epochs * 0.9);
    model.parameters().forEach(p => { p.data -= curLR * p.grad; });
    if (ep % 5 === 0 || ep === epochs - 1) {
      log(`epoch ${(ep+'').padStart(3)} │ loss ${totalLoss.data.toFixed(4)} │ acc ${(correct/X.length*100).toFixed(1)}% │ lr ${curLR.toFixed(5)}`);
    }
  }
  return model;
}

const CONTRAIL_COLORS = {
  '▶':'#3fb950','⊤':'#8b949e','←':'#d2a8ff','⊞':'#ff7b72','○':'#58a6ff',
  '⊥':'#f85149','◇':'#f0883e','∀':'#a5d6ff','→':'#7ee787','⊙':'#ffa657',
  '□':'#79c0ff','∘':'#30363d'
};
const GATE_MAP = {'▶':'H','⊤':'I','←':'M','⊞':'H','○':'H','⊥':'X','◇':'Ry(π/4)','∀':'T','→':'SWAP','⊙':'H','□':'Rz(0)','∘':'Rz(π/2)'};
const NOTE_MAP = {'H':'C4','I':'rest','M':'G3','X':'G4','Ry(π/4)':'A3','T':'B4','SWAP':'D5','Rz(0)':'D4','Rz(π/2)':'D4'};

function renderCode() {
  const table = document.getElementById('code-table');
  const counts = {};
  let html = '';
  CONTRAIL_SOURCE.forEach((row, i) => {
    const [sym, cat, code] = row;
    counts[sym] = (counts[sym] || 0) + 1;
    const color = CONTRAIL_COLORS[sym] || '#8b949e';
    const highlighted = code
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\b(class|const|let|var|function|return|for|if|new|this|instanceof|typeof)\b/g, '<span class="kw">$1</span>')
      .replace(/\b(Math|Array|Set|Value|Neuron|Layer|MLP)\b/g, '<span class="cls">$1</span>')
      .replace(/\b(constructor|add|mul|pow|tanh|relu|neg|sub|div|backward|call|parameters|from|forEach|flatMap|map|has|push|sqrt|random|abs|floor)\b/g, '<span class="fn">$1</span>')
      .replace(/(\/\/.*)/g, '<span class="cm">$1</span>')
      .replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
    html += `<tr><td class="ln">${i + 1}</td><td class="ct ${cat}" style="color:${color}" title="${cat} (${sym} → ${GATE_MAP[sym]||'?'} → ${NOTE_MAP[GATE_MAP[sym]]||'?'})">${sym}</td><td class="cd">${highlighted}</td></tr>`;
  });
  table.innerHTML = html;

  const statsRows = document.getElementById('stats-rows');
  const bar = document.getElementById('contrail-bar');
  let statsHtml = '';
  let barHtml = '';
  const total = CONTRAIL_SOURCE.length;
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  sorted.forEach(([sym, cnt]) => {
    const pct = (cnt / total * 100).toFixed(1);
    const color = CONTRAIL_COLORS[sym];
    const cat = CONTRAIL_SOURCE.find(r => r[0] === sym)?.[1] || '?';
    statsHtml += `<div class="row"><span class="k"><span style="color:${color}">${sym}</span> ${cat}</span><span class="v">${cnt} (${pct}%)</span></div>`;
    barHtml += `<span class="chip" style="border-color:${color};color:${color}">${sym}×${cnt}</span>`;
  });
  const entropy = -sorted.reduce((s, [, c]) => { const p = c / total; return s + (p > 0 ? p * Math.log2(p) : 0); }, 0);
  statsHtml += `<div class="row"><span class="k">total lines</span><span class="v">${total}</span></div>`;
  statsHtml += `<div class="row"><span class="k">entropy</span><span class="v">${entropy.toFixed(3)} / ${Math.log2(12).toFixed(3)} (${(entropy / Math.log2(12) * 100).toFixed(0)}%)</span></div>`;
  statsHtml += `<div class="row"><span class="k">unique symbols</span><span class="v">${sorted.length} / 12</span></div>`;
  statsRows.innerHTML = statsHtml;
  bar.innerHTML = barHtml;
}

function termLog(msg, cls) {
  const t = document.getElementById('term');
  if (cls) t.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  else t.innerHTML += msg + '\n';
  t.scrollTop = t.scrollHeight;
}

function drawViz(model, dataset) {
  const c = document.getElementById('viz');
  const dpr = devicePixelRatio || 1;
  const W = c.clientWidth, H = c.clientHeight;
  c.width = W * dpr; c.height = H * dpr;
  const ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.fillStyle = '#010409'; ctx.fillRect(0, 0, W, H);
  if (!dataset) return;

  const { X, y } = dataset;
  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  X.forEach(p => { xMin = Math.min(xMin, p[0]); xMax = Math.max(xMax, p[0]); yMin = Math.min(yMin, p[1]); yMax = Math.max(yMax, p[1]); });
  const pad = 0.5;
  xMin -= pad; xMax += pad; yMin -= pad; yMax += pad;

  const res = 40;
  for (let gi = 0; gi < res; gi++) {
    for (let gj = 0; gj < res; gj++) {
      const gx = xMin + (xMax - xMin) * gi / res;
      const gy = yMin + (yMax - yMin) * gj / res;
      const pred = model.call([new Value(gx), new Value(gy)]);
      const v = pred.data;
      const px = gi / res * W, py = gj / res * H, pw = W / res + 1, ph = H / res + 1;
      ctx.fillStyle = v > 0 ? 'rgba(59,130,246,0.15)' : 'rgba(239,68,68,0.15)';
      ctx.fillRect(px, py, pw, ph);
    }
  }

  X.forEach((p, i) => {
    const px = (p[0] - xMin) / (xMax - xMin) * W;
    const py = (p[1] - yMin) / (yMax - yMin) * H;
    ctx.beginPath();
    ctx.arc(px, py, 3, 0, Math.PI * 2);
    ctx.fillStyle = y[i] > 0 ? '#58a6ff' : '#f85149';
    ctx.fill();
  });
}

function runTraining(name) {
  const datasets = { xor: genXOR, moon: genMoon, spiral: genSpiral, circle: genCircle };
  const gen = datasets[name] || datasets.xor;
  const data = gen(200);
  const arch = name === 'spiral' ? [2, 16, 16, 1] : [2, 8, 8, 1];
  const model = new MLP(arch);
  const epochs = name === 'spiral' ? 60 : 40;

  termLog(`\n─── ${name.toUpperCase()} ───`, 'ok');
  termLog(`arch: ${arch.join('→')} · params: ${model.parameters().length} · epochs: ${epochs}`);

  const t0 = performance.now();
  train(model, data, epochs, 0.05, (msg) => termLog(msg));
  const ms = (performance.now() - t0).toFixed(1);

  termLog(`done in ${ms}ms`, 'ok');
  drawViz(model, data);
}

function runBenchmark() {
  if (!window.qbitCodec) { termLog('qbit-dac.js not loaded', 'warn'); return; }
  const src = CONTRAIL_SOURCE.map(r => r[2]).join('\n');
  const bench = qbitCodec.contrailBenchmark(src, 'javascript', 'ugrad-contrail');
  termLog('\n─── CONTRAIL BENCHMARK ───', 'ok');
  termLog(`lines: ${bench.totalLines} · speed: ${bench.linesPerMs.toFixed(0)} lines/ms`);
  termLog(`entropy: ${bench.entropy.toFixed(3)} / ${bench.maxEntropy.toFixed(3)} (${bench.entropyPct.toFixed(0)}%)`);
  termLog(`dominant: ${bench.dominant.contrail} ${bench.dominant.category} ${(bench.dominant.pct).toFixed(1)}%`);
  const seq = bench.contrailSequence.slice(0, 40).join('');
  termLog(`sequence: ${seq}…`, 'val');
  if (bench.gates) {
    const top3 = Object.entries(bench.gates).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([g,c])=>`${g}:${c}`).join(' ');
    termLog(`gates: ${top3}`);
  }
  if (bench.notes) {
    const top3 = Object.entries(bench.notes).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([n,c])=>`${n}:${c}`).join(' ');
    termLog(`notes: ${top3}`);
  }
}

document.getElementById('btn-circle').addEventListener('click', () => runTraining('circle'));
document.getElementById('btn-bench').addEventListener('click', runBenchmark);
