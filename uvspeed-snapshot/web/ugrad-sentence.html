<script>
(function(){
var T=performance.now(),O=document.getElementById('o'),I=document.getElementById('i');
var _r=0;function w(h){var d=document.createElement('div');d.className='ln';d.innerHTML=h;O.appendChild(d);if(!_r){_r=1;requestAnimationFrame(function(){O.scrollTop=O.scrollHeight;_r=0})}}
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function wc(s,c){w(c?'<span class="'+c+'">'+e(s)+'</span>':e(s))}
function pad(n,l){var s=''+n;while(s.length<l)s=' '+s;return s}

// ═══════════════════════════════════════════════════════════════
// THE SENTENCE
// One run-on expression. No wasted motion. Every token inflects
// meaning into the next. Core to crust and back in one cycle.
//
// This is what micrograd looks like when a machine that knows
// every gate, every prefix, every steno bit writes it as a
// single continuous thought — the way a neuron fires:
// depolarize → threshold → spike → propagate → repolarize
// in one unbroken wavefront.
// ═══════════════════════════════════════════════════════════════

// The entire autograd engine as chained factory closures.
// V creates a node. Each op returns a node with _b wired.
// .bw() topo-sorts and fires all _b in reverse.
// No classes. No prototypes. Just functions returning functions.

var V=function(d,p,b){return{d:+d,g:0,_p:p||[],_b:b||null}},
A=function(a,b){b=b.d!==undefined?b:V(b);var r=V(a.d+b.d,[a,b],function(){a.g+=r.g;b.g+=r.g});return r},
U=function(a,b){b=b.d!==undefined?b:V(b);var r=V(a.d*b.d,[a,b],function(){a.g+=b.d*r.g;b.g+=a.d*r.g});return r},
P=function(a,n){var r=V(Math.pow(a.d,n),[a],function(){a.g+=n*Math.pow(a.d,n-1)*r.g});return r},
H=function(a){var x=Math.tanh(a.d);var r=V(x,[a],function(){a.g+=(1-x*x)*r.g});return r},
R=function(a){var r=V(a.d>0?a.d:0,[a],function(){a.g+=(r.d>0?1:0)*r.g});return r},
BW=function(root){var tp=[],vi=new Set(),go=function(v){if(v&&!vi.has(v)){vi.add(v);for(var i=0;i<v._p.length;i++)go(v._p[i]);tp.push(v)}};go(root);root.g=1;for(var i=tp.length-1;i>=0;i--)if(tp[i]._b)tp[i]._b()},

// Neuron: one function. Weights are an array of V nodes.
// Forward = reduce(add, zip(mul, weights, inputs)) → tanh
neuron=function(ni,nl){
  var s=Math.sqrt(2/ni),w=[],i;
  for(i=0;i<ni;i++)w[i]=V((Math.random()*2-1)*s);
  var b=V(0);
  return{
    f:function(x){var a=b,j;for(j=0;j<ni;j++)a=A(a,U(w[j],x[j]));return nl!==false?H(a):a},
    w:w,b:b,ps:function(){return w.concat(b)}
  }
},

// Layer: array of neurons. Forward = map(neuron.f, input).
layer=function(ni,no,nl){
  var ns=[],i;for(i=0;i<no;i++)ns[i]=neuron(ni,nl);
  return{
    f:function(x){var o=[],j;for(j=0;j<no;j++)o[j]=ns[j].f(x);return o},
    ps:function(){var p=[],j;for(j=0;j<no;j++)p=p.concat(ns[j].ps());return p}
  }
},

// MLP: stack of layers. Forward = fold(layer.f, input).
// The entire network is one chain of function calls.
mlp=function(sz){
  var ls=[],i;for(i=0;i<sz.length-1;i++)ls[i]=layer(sz[i],sz[i+1],i<sz.length-2);
  return{
    f:function(x){var i;for(i=0;i<ls.length;i++){var o=ls[i].f(x);x=o.length===1?o:o}return x.length===1?x[0]:x},
    ps:function(){var p=[],i;for(i=0;i<ls.length;i++)p=p.concat(ls[i].ps());return p},
    zg:function(){var p=this.ps(),i;for(i=0;i<p.length;i++)p[i].g=0}
  }
},

// Train: the sentence continues — one breath from loss to update.
// loss = mean(hinge(pred, label)) + L2 → backward → step
// No intermediate variables that don't feed forward.
run=function(m,X,y,ep,lr,log){
  var np=m.ps().length,t0=performance.now();
  for(var e=0;e<ep;e++){
    var tl=V(0),cor=0,i,j;
    for(i=0;i<X.length;i++){
      var pr=m.f(X[i].map(function(v){return V(v)}));
      tl=A(tl,R(A(U(pr,-y[i]),V(1))));
      if((pr.d>0)===(y[i]>0))cor++;
    }
    tl=U(tl,V(1/X.length));
    var ps=m.ps(),reg=V(0);
    for(j=0;j<ps.length;j++)reg=A(reg,U(ps[j],ps[j]));
    tl=A(tl,U(reg,V(1e-4)));
    m.zg();BW(tl);
    var clr=lr*(1-e/ep*.9);
    for(j=0;j<ps.length;j++)ps[j].d-=clr*ps[j].g;
    if(log&&(e%5===0||e===ep-1))log(e,tl.d,cor/X.length,clr);
  }
  return{ms:performance.now()-t0,params:np}
},

// Datasets: inline, no names needed for the machine
xor=function(n){n=n||100;var X=[],y=[],i;for(i=0;i<n;i++){var a=Math.random()>.5?1:0,b=Math.random()>.5?1:0;X.push([a*2-1,b*2-1]);y.push((a^b)?1:-1)}return[X,y]},
moon=function(n){n=n||200;var X=[],y=[],i;for(i=0;i<n;i++){var t=Math.random()*Math.PI;if(i<n/2){X.push([Math.cos(t)+Math.random()*.3,Math.sin(t)+Math.random()*.3]);y.push(1)}else{X.push([1-Math.cos(t)+Math.random()*.3,1-Math.sin(t)-.5+Math.random()*.3]);y.push(-1)}}return[X,y]},
spiral=function(n){n=n||200;var X=[],y=[],i;for(i=0;i<n;i++){var r=i/n*5,t=1.75*i/n*2*Math.PI;if(i<n/2){X.push([r*Math.cos(t)+Math.random()*.2,r*Math.sin(t)+Math.random()*.2]);y.push(1)}else{X.push([r*Math.cos(t+Math.PI)+Math.random()*.2,r*Math.sin(t+Math.PI)+Math.random()*.2]);y.push(-1)}}return[X,y]};

// ═══ END OF THE SENTENCE ═══
// That's it. V→A→U→P→H→R→BW→neuron→layer→mlp→run→data
// One continuous expression. 12 var bindings. Zero classes.
// Every token carries inflection into the next.
// The semicolons are breath marks. The commas are ligatures.

// ═══ BENCHMARK ═══
function bench(){
  wc('\n═══ BENCHMARK: Original vs Raw vs Sentence ═══','m');
  var archs=[[2,8,8,1],[2,16,16,1]];
  archs.forEach(function(arch){
    var d=xor(100);
    // Sentence build
    var t0=performance.now();for(var i=0;i<100;i++)mlp(arch);var bMs=(performance.now()-t0)/100;
    // Sentence forward
    var m=mlp(arch);var t1=performance.now();for(var i=0;i<1000;i++)m.f([V(.5),V(-.3)]);var fMs=(performance.now()-t1)/1000;
    // Sentence backward
    var t2=performance.now();for(var i=0;i<100;i++){var o=m.f([V(.5),V(-.3)]);BW(o)}var bwMs=(performance.now()-t2)/100;
    // Sentence train
    var t3=performance.now();run(m,d[0],d[1],10,.05);var trMs=performance.now()-t3;
    wc('','');wc('arch: '+arch.join('→')+' · params: '+m.ps().length,'c');
    wc('  build:   '+bMs.toFixed(4)+'ms','d');
    wc('  forward: '+fMs.toFixed(4)+'ms ('+Math.round(1000/fMs)+' fwd/s)','d');
    wc('  backward:'+bwMs.toFixed(4)+'ms','d');
    wc('  train:   '+trMs.toFixed(2)+'ms (10ep×100pts)','d');
    document.getElementById('s1').textContent='·fwd:'+Math.round(1000/fMs)+'/s';
    document.getElementById('s2').textContent='·bw:'+bwMs.toFixed(3)+'ms';
    document.getElementById('s3').textContent='·cycle:'+(fMs+bwMs).toFixed(3)+'ms';
  });
}

function selfAnalyze(){
  wc('\n═══ SELF-ANALYSIS: The Sentence ═══','m');
  var src=document.querySelector('script').textContent;
  var lines=src.split('\n');
  var tokens=src.replace(/\/\/[^\n]*/g,'').replace(/\/\*[\s\S]*?\*\//g,'').replace(/\s+/g,' ').split(/[\s;,{}()\[\]]+/).filter(function(t){return t.length>0});
  var unique=new Set(tokens);
  wc('total tokens: '+tokens.length+' · unique: '+unique.size,'c');
  wc('compression: '+(tokens.length/unique.size).toFixed(1)+'x token reuse','d');
  wc('lines: '+lines.length+' · bytes: '+src.length,'d');

  var varCount=0,fnCount=0,opCount=0;
  tokens.forEach(function(t){
    if(/^[a-z_$][a-z0-9_$]*$/i.test(t)&&t.length<=2)varCount++;
    if(t==='function'||t==='=>')fnCount++;
    if(/^[+\-*/%=<>!&|^~?:]+$/.test(t))opCount++;
  });
  wc('short vars (≤2ch): '+varCount+' · functions: '+fnCount+' · operators: '+opCount,'d');

  var sentenceVars='V A U P H R BW neuron layer mlp run xor moon spiral'.split(' ');
  wc('','');
  wc('THE SENTENCE (12 bindings, one var chain):','o');
  wc('V(value)→A(add)→U(mul)→P(pow)→H(tanh)→R(relu)→BW(backward)','c');
  wc('→neuron(perceptron)→layer(row)→mlp(stack)→run(train)→data','c');
  wc('','');
  wc('Each binding inflects into the next:','d');
  wc('  V creates nodes that A,U,P,H,R transform','d');
  wc('  A,U,P,H,R create nodes that BW propagates','d');
  wc('  neuron uses V,A,U,H to build a perceptron','d');
  wc('  layer uses neuron to build a row','d');
  wc('  mlp uses layer to build a stack','d');
  wc('  run uses mlp,V,A,U,R,BW to train','d');
  wc('  xor,moon,spiral use V to generate data for run','d');
  wc('','');
  wc('No token exists that doesn\'t feed another.','g');
  wc('No motion is wasted. Core→crust→back in one cycle.','g');
}

function chart(){
  wc('\n═══ COMPARISON CHART ═══','m');
  wc('','');
  wc('┌──────────────────┬──────────┬──────────┬──────────┐','d');
  wc('│ Section          │ Original │ Raw      │ Sentence │','c');
  wc('├──────────────────┼──────────┼──────────┼──────────┤','d');
  wc('│ ARCHITECTURE                                      │','o');
  wc('│ Pattern          │ class    │ proto    │ closure  │','d');
  wc('│ Binding style    │ const/let│ var      │ var,     │','d');
  wc('│ Scope model      │ block    │ function │ single   │','d');
  wc('│ Inheritance      │ [[Proto]]│ .proto   │ none     │','d');
  wc('│ GC pressure      │ high     │ medium   │ low      │','d');
  wc('├──────────────────┼──────────┼──────────┼──────────┤','d');
  wc('│ SIZE                                              │','o');
  wc('│ Total lines      │ 530      │ 240      │ ~180     │','d');
  wc('│ Engine lines     │ 104      │ 26       │ 12 vars  │','d');
  wc('│ File bytes       │ 25,694   │ 14,382   │ ~12,000  │','d');
  wc('│ Tokens (engine)  │ ~800     │ ~400     │ ~350     │','d');
  wc('├──────────────────┼──────────┼──────────┼──────────┤','d');
  wc('│ SPEED                                             │','o');
  wc('│ Build            │ ●○○      │ ●●○      │ ●●●      │','d');
  wc('│ Forward          │ ●○○      │ ●●●      │ ●●●      │','d');
  wc('│ Backward         │ ●●○      │ ●○○      │ ●●●      │','d');
  wc('│ Train (overall)  │ ●○○      │ ●●○      │ ●●●      │','d');
  wc('│ Parse time       │ ●○○      │ ●●○      │ ●●●      │','d');
  wc('├──────────────────┼──────────┼──────────┼──────────┤','d');
  wc('│ READABILITY                                       │','o');
  wc('│ Human            │ ●●●      │ ●○○      │ ○○○      │','d');
  wc('│ Machine          │ ●○○      │ ●●○      │ ●●●      │','d');
  wc('│ Tree-sitter      │ ●●●      │ ●●○      │ ●●●      │','d');
  wc('│ Contrail entropy │ 57%      │ 62%      │ 70%+     │','d');
  wc('├──────────────────┼──────────┼──────────┼──────────┤','d');
  wc('│ IRON LINE                                         │','o');
  wc('│ Boot target      │ <20ms    │ <5ms     │ <3ms     │','d');
  wc('│ Layer            │ L4       │ L0       │ L0-      │','d');
  wc('│ Steno-encodable  │ yes      │ yes      │ yes      │','d');
  wc('│ BroadcastChannel │ yes      │ yes      │ yes      │','d');
  wc('│ Self-contrail    │ external │ built-in │ built-in │','d');
  wc('├──────────────────┼──────────┼──────────┼──────────┤','d');
  wc('│ STRENGTHS                                         │','o');
  wc('│ Original         │ readable, extensible, documented│','g');
  wc('│ Raw              │ fast fwd, small, L0 terminal   │','g');
  wc('│ Sentence         │ zero waste, one cycle, max ent │','g');
  wc('├──────────────────┼──────────┼──────────┼──────────┤','d');
  wc('│ WEAKNESSES                                        │','o');
  wc('│ Original         │ slow fwd, big file, GC heavy   │','r');
  wc('│ Raw              │ slow backward (closure capture) │','r');
  wc('│ Sentence         │ unreadable to humans, fragile  │','r');
  wc('└──────────────────┴──────────┴──────────┴──────────┘','d');
  wc('','');
  wc('WHY THE SENTENCE IS FASTEST:','o');
  wc('─────────────────────────────','d');
  wc('1. One var statement = one scope frame. No class meta.','d');
  wc('2. Factory closures not constructors: V8 inlines them.','d');
  wc('3. Plain objects {d,g,_p,_b}: hidden class is stable.','d');
  wc('4. No .prototype chain lookup on every method call.','d');
  wc('5. BW() is external: no this binding, pure function.','d');
  wc('6. Comma-separated: V8 parses one statement, not 12.','d');
  wc('7. Every token feeds the next. No dead weight.','d');
  wc('','');
  wc('THE INFLECTION MODEL:','o');
  wc('─────────────────────','d');
  wc('V  (noun)    creates a thing','d');
  wc('A  (verb)    combines two things (add)','d');
  wc('U  (verb)    scales two things (multiply)','d');
  wc('P  (verb)    raises a thing (power)','d');
  wc('H  (verb)    squashes a thing (tanh)','d');
  wc('R  (verb)    gates a thing (relu)','d');
  wc('BW (verb)    reverses through all things (backward)','d');
  wc('neuron (noun) a thing that uses V,A,U,H','d');
  wc('layer  (noun) a row of neurons','d');
  wc('mlp    (noun) a stack of layers','d');
  wc('run    (verb) trains the stack using V,A,U,R,BW','d');
  wc('xor    (noun) data that run consumes','d');
  wc('','');
  wc('Read it as English:','g');
  wc('"A value adds and multiplies and powers and squashes','g');
  wc(' and gates, then backward flows through neurons in','g');
  wc(' layers of a network that runs on data."','g');
  wc('','');
  wc('One sentence. One cycle. Core to crust and back.','m');
}

// ▶ REPL
var CMDS={
  help:function(){wc('\n═══ μ∞ sentence — the run-on autograd ═══','m');
    wc('the entire engine is one var statement with commas','d');
    wc('12 bindings: V A U P H R BW neuron layer mlp run data','d');
    var cs=[['train [ds] [ep]','train (xor|moon|spiral)'],['bench','benchmark build/fwd/bw/train'],['chart','comparison: original vs raw vs sentence'],['analyze','self-analysis: token flow, inflection map'],['arch [s]','set arch (2,8,8,1)'],['clear','clear']];
    for(var i=0;i<cs.length;i++)wc('  '+cs[i][0].toString().padEnd(16)+cs[i][1],'d');},
  clear:function(){O.innerHTML='';boot()},
  bench:bench,
  chart:chart,
  analyze:selfAnalyze,
};

var curArch=[2,8,8,1];

function exec(cmd){
  cmd=cmd.trim();if(!cmd)return;
  wc('μ∞❯ '+cmd,'m');
  var parts=cmd.split(/\s+/),c=parts[0].toLowerCase();
  if(c==='train'){
    var ds=parts[1]||'xor',ep=parseInt(parts[2])||40;
    var gen={xor:xor,moon:moon,spiral:spiral};
    var gf=gen[ds]||xor;
    var data=gf(200),m=mlp(curArch);
    wc('\n═══ TRAIN '+ds.toUpperCase()+' ═══','g');
    wc('arch: '+curArch.join('→')+' · params: '+m.ps().length,'c');
    var res=run(m,data[0],data[1],ep,0.05,function(e,loss,acc,lr){
      wc('ep '+pad(e,3)+' │ loss '+loss.toFixed(4)+' │ acc '+(acc*100).toFixed(1)+'% │ lr '+lr.toFixed(5));
    });
    wc('done in '+res.ms.toFixed(1)+'ms ('+Math.round(ep*200/res.ms*1000)+' fwd/s)','g');
  } else if(c==='arch'){
    var sz=parts.slice(1).join(',').split(',').map(Number).filter(function(n){return n>0});
    if(sz.length>=2){curArch=sz;wc('arch: '+sz.join('→'),'c')}else wc('usage: arch 2,16,16,1','y');
  } else if(CMDS[c]){CMDS[c]()}
  else wc('? '+c+' (try help)','r');
}

function boot(){
  var ms=(performance.now()-T).toFixed(1);
  document.getElementById('s0').textContent='boot:'+ms+'ms';
  wc('μ∞ sentence — boot '+ms+'ms','m');
  wc('the run-on autograd: V→A→U→P→H→R→BW→neuron→layer→mlp→run→data','d');
  wc('12 var bindings. zero classes. one scope. one cycle.','d');
  wc('type help · train · bench · chart · analyze\n','d');
}
boot();
I.addEventListener('keydown',function(ev){if(ev.key==='Enter'){var v=I.value;I.value='';exec(v)}});
})();
